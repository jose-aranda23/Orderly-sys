<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Orderly</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="login-bg">

    <div class="login-wrapper">
        <div class="login-blob"></div>
        <div class="login-blob blob-2"></div>

        <div class="glass-card login-card">
            <div class="login-header">
                <h1 style="color: white;">🏭 Orderly</h1>
                <p>Sistema de Solicitudes de Producción</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="correo">Correo Electrónico</label>
                    <div class="input-container">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                            </path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="correo" placeholder="admin@sistema.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <div class="input-container">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="contrasena" placeholder="••••••••" required>
                    </div>
                </div>

                <div id="loginAlert" class="alert hidden">
                    <span class="alert-icon">⚠️</span>
                    <span id="loginAlertMessage" class="alert-message">Credenciales inválidas</span>
                </div>

                <button type="submit" class="btn-primary btn-block">
                    <span>Acceder</span>
                    <span class="btn-spinner hidden"></span>
                </button>
            </form>
            <div class="login-footer">
                <p>Nivel de acceso asegurado por Encriptación Avanzada</p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>

</html>
