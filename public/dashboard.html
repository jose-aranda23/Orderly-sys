<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orderly</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Dashboard specific layout - Modern Dashboard */
        body {
            background-color: var(--clr-bg-darkest);
            display: flex;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Sidebar - Dark */
        .sidebar {
            width: 260px;
            background: var(--clr-sidebar);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            z-index: 20;
        }

        .sidebar-header {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            color: #fff;
            font-weight: 700;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #94A3B8;
            text-decoration: none;
            border-radius: var(--border-radius-sm);
            margin-bottom: 0.25rem;
            transition: var(--transition-fast);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            background: var(--clr-sidebar-hover);
            color: #fff;
        }

        .nav-link.active {
            background: var(--clr-primary);
            color: #fff;
        }

        .user-panel {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid #334155;
        }

        .user-info p {
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
        }

        .user-info span {
            font-size: 0.75rem;
            color: #94A3B8;
        }

        /* Main Content - Light */
        .main-content {
            flex: 1;
            padding: 1.5rem 2rem;
            overflow-y: auto;
            position: relative;
            background: var(--clr-bg-darkest);
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding: 0 0.5rem;
        }

        .topbar h1 {
            font-size: 1.5rem;
            color: var(--clr-text-main);
            font-weight: 600;
        }

        /* Flex Grid */
        .panel {
            padding: 0;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Card container */
        .card {
            background: var(--clr-bg-card);
            border: 1px solid var(--clr-border);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
            padding: 1.5rem;
        }
        
        /* Table adjustments */
        .data-table {
            margin-top: 0;
            border-radius: var(--border-radius-lg);
        }
        
        /* Spinner */
        .btn-spinner {
            border-color: var(--clr-primary);
            border-top-color: transparent;
        }

        /* Badge overrides for dark text */
        .badge {
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>🏭 Orderly</h1>
        </div>

        <nav id="mainNav">
            <a class="nav-link active" data-view="solicitudes">
                <span>📋 Solicitudes</span>
            </a>
            <!-- Protected Elements, loaded dynamically JS -->
            <a class="nav-link hidden" data-view="productos" id="navProductos">
                <span>📦 Productos</span>
            </a>
            <a class="nav-link hidden" data-view="informes" id="navInformes">
                <span>📊 Informes</span>
            </a>
            <a class="nav-link hidden" data-view="usuarios" id="navUsuarios">
                <span>👥 Usuarios</span>
            </a>
        </nav>

        <div class="user-panel">
            <div class="user-info">
                <p id="userNameDisplay">Cargando...</p>
                <span id="userLevelDisplay">Nivel -</span>
            </div>
            <button id="logoutBtn" class="btn-outline btn-sm" style="margin-top:1rem; width:100%; border-color: #334155; color: #94A3B8;">Cerrar Sesión</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1 id="pageTitle">Listado de Solicitudes</h1>
            <button id="btnNewRequest" class="btn-primary">+ Nueva Solicitud</button>
        </header>

        <!-- Dynamic Content Mount Point -->
        <div id="appContainer" class="card panel">
            <div id="loader" style="text-align: center; padding: 3rem;">
                <div class="btn-spinner"
                    style="margin: 0 auto; display: block; border-color:var(--clr-primary); border-top-color:transparent">
                </div>
                <p style="margin-top: 1rem; color: var(--clr-text-muted)">Cargando datos...</p>
            </div>
            <div id="tableContainer" class="hidden">
                <!-- Inyectado via JS -->
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr id="tableHeadings"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Base (Used for Forms & Approvals) -->
    <div id="globalModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Acción</h3>
            </div>
            <div id="modalBody">
                <!-- Injected Form Body -->
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
