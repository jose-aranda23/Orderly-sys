<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Producción</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Dashboard specific layout */
        body {
            background-color: var(--clr-bg-darkest);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: rgba(15, 23, 42, 0.95);
            border-right: 1px solid var(--clr-border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            z-index: 20;
        }

        .sidebar-header {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .sidebar-header h2 {
            font-size: 1.2rem;
            color: var(--clr-primary);
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            color: var(--clr-text-muted);
            text-decoration: none;
            border-radius: var(--border-radius-sm);
            margin-bottom: 0.5rem;
            transition: var(--transition-fast);
            cursor: pointer;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--clr-primary);
        }

        .user-panel {
            margin-top: auto;
            padding-top: 1.5rem;
            border-top: 1px solid var(--clr-border);
        }

        .user-info p {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .user-info span {
            font-size: 0.75rem;
            color: var(--clr-text-muted);
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            position: relative;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--clr-border);
        }

        /* Lists & Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--clr-border);
        }

        .data-table th {
            color: var(--clr-text-muted);
            font-weight: 500;
        }

        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Status badges */
        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-creada {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }

        .badge-aprobada {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .badge-produccion {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .badge-finalizada {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .badge-rechazada {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-normal);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--clr-bg-card);
            border: 1px solid var(--clr-border);
            padding: 2rem;
            border-radius: var(--border-radius-md);
            width: 90%;
            max-width: 500px;
            transform: translateY(20px);
            transition: var(--transition-normal);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--clr-border);
            color: var(--clr-text-main);
            padding: 0.8rem 1.5rem;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }

        /* Flex Grid */
        .panel {
            padding: 1.5rem;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>🏭 Orderly Sys</h1>
        </div>

        <nav id="mainNav">
            <a class="nav-link active" data-view="solicitudes">
                <span>📋 Solicitudes</span>
            </a>
            <!-- Protected Elements, loaded dynamically JS -->
            <a class="nav-link hidden" data-view="productos" id="navProductos">
                <span>📦 Productos</span>
            </a>
            <a class="nav-link hidden" data-view="usuarios" id="navUsuarios">
                <span>👥 Usuarios</span>
            </a>
        </nav>

        <div class="user-panel">
            <div class="user-info">
                <p id="userNameDisplay">Cargando...</p>
                <span id="userLevelDisplay">Nivel -</span>
            </div>
            <button id="logoutBtn" class="btn-outline btn-sm" style="margin-top:1rem; width:100%">Cerrar Sesión</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1 id="pageTitle">Listado de Solicitudes</h1>
            <button id="btnNewRequest" class="btn-primary">+ Nueva Solicitud</button>
        </header>

        <!-- Dynamic Content Mount Point -->
        <div id="appContainer" class="glass-card panel">
            <div id="loader" style="text-align: center; padding: 3rem;">
                <div class="btn-spinner"
                    style="margin: 0 auto; display: block; border-color:var(--clr-primary); border-top-color:transparent">
                </div>
                <p style="margin-top: 1rem; color: var(--clr-text-muted)">Cargando datos empresariales...</p>
            </div>
            <div id="tableContainer" class="hidden">
                <!-- Inyectado via JS -->
                <table class="data-table" id="dataTable">
                    <thead>
                        <tr id="tableHeadings"></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Base (Used for Forms & Approvals) -->
    <div id="globalModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Acción</h3>
            </div>
            <div id="modalBody">
                <!-- Injected Form Body -->
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
